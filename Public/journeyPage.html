<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KITV - Journey</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --teal: #2a9d8f;
            --teal-dark: #1a7b7b;
            --teal-glow: rgba(42, 157, 143, 0.4);
            --amber: #d4a574;
            --amber-glow: rgba(212, 165, 116, 0.35);
            --cream: #e8dcc4;
            --bg: #111c1c;
            --bg2: #162020;
            --card: #1b2e2e;
            --text: #c8d8d8;
            --text-dim: #607070;
            --border: rgba(42, 157, 143, 0.2);
            --mono: 'Space Mono', monospace;
            --sans: 'Syne', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: var(--mono);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(42,157,143,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(42,157,143,0.04) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
            z-index: 0;
        }

        .ambient {
            position: fixed;
            border-radius: 50%;
            filter: blur(130px);
            pointer-events: none;
            z-index: 0;
        }
        .ambient-1 {
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(42,157,143,0.1) 0%, transparent 70%);
            top: -200px; left: -200px;
        }
        .ambient-2 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(212,165,116,0.07) 0%, transparent 70%);
            bottom: 0; right: -150px;
        }

        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            padding: 1.2rem 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(17, 28, 28, 0.75);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(42,157,143,0.2);
        }

        .logo {
            font-family: var(--sans);
            font-weight: 800;
            font-size: 1.6rem;
            color: var(--teal);
            letter-spacing: -1px;
            text-shadow: 0 0 30px var(--teal-glow);
            text-decoration: none;
        }

        nav ul { display: flex; list-style: none; gap: 0.5rem; }

        nav a {
            font-family: var(--mono);
            font-size: 0.8rem;
            color: var(--text-dim);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            letter-spacing: 1px;
            transition: all 0.25s;
            border: 1px solid transparent;
        }
        nav a:hover, nav a.active {
            color: var(--teal);
            border-color: rgba(42,157,143,0.3);
            background: rgba(42,157,143,0.08);
        }

        .page-header {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 8rem 2rem 2rem;
        }

        .page-eyebrow {
            font-size: 0.7rem;
            letter-spacing: 4px;
            color: var(--teal);
            margin-bottom: 0.7rem;
        }

        .page-title {
            font-family: var(--sans);
            font-weight: 800;
            font-size: clamp(2.4rem, 5vw, 4rem);
            color: var(--cream);
            letter-spacing: -2px;
            line-height: 1.05;
            margin-bottom: 0.8rem;
        }

        .page-subtitle {
            font-size: 0.78rem;
            color: var(--text-dim);
            letter-spacing: 1px;
            margin-bottom: 1.2rem;
        }

        .progress-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            background: rgba(42,157,143,0.08);
            border: 1px solid rgba(42,157,143,0.25);
            border-radius: 100px;
            padding: 0.45rem 1.2rem;
            font-size: 0.75rem;
            color: var(--teal);
            letter-spacing: 1px;
        }

        .progress-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--teal);
            box-shadow: 0 0 8px var(--teal);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .skill-tree-container {
            position: relative;
            width: 100%;
            min-height: 100vh;
            padding: 3rem 2rem 6rem;
            overflow-y: auto;
            z-index: 1;
        }

        svg.connections {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .connection-line {
            stroke: rgba(42, 157, 143, 0.15);
            stroke-width: 2;
            fill: none;
            stroke-dasharray: 8, 5;
        }

        .connection-line.unlocked {
            stroke: var(--teal);
            stroke-width: 2;
            stroke-dasharray: none;
            animation: lineGlow 2.5s ease-in-out infinite alternate;
        }

        @keyframes lineGlow {
            from { filter: drop-shadow(0 0 2px rgba(42,157,143,0.4)); }
            to   { filter: drop-shadow(0 0 8px rgba(42,157,143,0.8)); }
        }

        .skill-tree {
            position: relative;
            max-width: 1100px;
            margin: 0 auto;
            z-index: 2;
            padding-bottom: 4rem;
        }

        .map-path { position: relative; width: 100%; }

        .path-segment {
            display: flex;
            align-items: center;
            margin: 2.2rem 0;
            min-height: 150px;
        }

        .path-segment.left   { justify-content: flex-start; padding-left: 10%; }
        .path-segment.center { justify-content: center; }
        .path-segment.right  { justify-content: flex-end; padding-right: 10%; }

        .skill-node {
            position: relative;
            width: 120px;
            height: 120px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .skill-circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            position: relative;
        }

        .skill-node.locked .skill-circle {
            background: rgba(17, 28, 28, 0.8);
            border: 2px solid rgba(42,157,143,0.1);
            cursor: not-allowed;
        }

        .skill-node.unlocked .skill-circle {
            background: var(--card);
            border: 2px solid var(--teal);
            box-shadow:
                0 0 0 4px rgba(42,157,143,0.08),
                0 0 20px rgba(42,157,143,0.25),
                inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .skill-node.unlocked:hover .skill-circle {
            transform: scale(1.1);
            box-shadow:
                0 0 0 6px rgba(42,157,143,0.12),
                0 0 35px rgba(42,157,143,0.45);
            border-color: var(--amber);
        }

        .skill-node.viewed .skill-circle {
            background: linear-gradient(135deg, rgba(42,157,143,0.2), rgba(212,165,116,0.15));
            border: 2px solid var(--amber);
            box-shadow:
                0 0 0 4px rgba(212,165,116,0.08),
                0 0 20px rgba(212,165,116,0.2);
        }

        .skill-node.viewed:hover .skill-circle {
            transform: scale(1.1);
            box-shadow:
                0 0 0 6px rgba(212,165,116,0.12),
                0 0 35px rgba(212,165,116,0.35);
        }

        .skill-icon {
            font-size: 1.9rem;
            margin-bottom: 0.25rem;
            filter: drop-shadow(0 0 4px rgba(42,157,143,0.4));
        }

        .skill-node.locked .skill-icon { filter: none; opacity: 0.25; }

        .skill-year {
            font-family: var(--mono);
            font-size: 0.62rem;
            color: var(--teal);
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .skill-node.locked .skill-year { color: var(--text-dim); }
        .skill-node.viewed .skill-year { color: var(--amber); }

        .skill-label {
            position: absolute;
            bottom: -2.6rem;
            left: 50%;
            transform: translateX(-50%);
            font-family: var(--mono);
            font-size: 0.72rem;
            color: var(--text-dim);
            white-space: nowrap;
            text-align: center;
            width: 160px;
            letter-spacing: 0.5px;
        }

        .skill-node.unlocked .skill-label { color: var(--text); }
        .skill-node.viewed .skill-label   { color: var(--amber); }

        .skill-node.viewed .skill-circle::after {
            content: '✓';
            position: absolute;
            top: -4px; right: -4px;
            width: 22px; height: 22px;
            border-radius: 50%;
            background: var(--amber);
            color: var(--bg);
            font-size: 0.7rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 22px;
            text-align: center;
            box-shadow: 0 0 10px rgba(212,165,116,0.5);
        }

        /* ─── MODAL ─── */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(5, 12, 12, 0.92);
            backdrop-filter: blur(16px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .modal.active { display: flex; }

        .modal-content {
            background: #151f1f;
            border: 1px solid rgba(42,157,143,0.3);
            border-radius: 20px;
            padding: 0;
            max-width: 760px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            box-shadow:
                0 0 0 1px rgba(42,157,143,0.08),
                0 40px 100px rgba(0,0,0,0.7),
                0 0 80px rgba(42,157,143,0.06);
        }

        .modal-content::-webkit-scrollbar { width: 4px; }
        .modal-content::-webkit-scrollbar-track { background: transparent; }
        .modal-content::-webkit-scrollbar-thumb { background: rgba(42,157,143,0.3); border-radius: 4px; }

        .modal-header {
            position: sticky;
            top: 0;
            z-index: 10;
            background: rgba(21, 31, 31, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(42,157,143,0.15);
            padding: 1.5rem 2rem;
            border-radius: 20px 20px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .modal-header-left { flex: 1; }

        .modal-date {
            font-size: 0.7rem;
            letter-spacing: 3px;
            color: var(--teal);
            margin-bottom: 0.3rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .modal-date::before {
            content: '//';
            opacity: 0.5;
        }

        .modal-title {
            font-family: var(--sans);
            font-weight: 800;
            font-size: 1.7rem;
            color: var(--cream);
            letter-spacing: -1px;
        }

        .modal-close {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: rgba(212,165,116,0.1);
            border: 1px solid rgba(212,165,116,0.25);
            color: var(--amber);
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-left: 1rem;
            line-height: 1;
        }
        .modal-close:hover {
            background: var(--amber);
            color: var(--bg);
            transform: rotate(90deg);
        }

        .modal-body { padding: 2rem; }

        .modal-description {
            font-size: 0.85rem;
            color: var(--text-dim);
            line-height: 1.9;
            padding-left: 1rem;
            border-left: 2px solid rgba(42,157,143,0.25);
            margin-bottom: 2rem;
        }

        .modal-images-label {
            font-size: 0.68rem;
            letter-spacing: 3px;
            color: var(--teal);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .modal-images-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(42,157,143,0.15);
        }

        .modal-images {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.8rem;
        }

        .modal-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 12px;
            border: 1px solid rgba(42,157,143,0.2);
            transition: all 0.3s;
            cursor: zoom-in;
            background: rgba(42,157,143,0.05);
        }

        .modal-img:hover {
            border-color: var(--teal);
            transform: scale(1.02);
            box-shadow: 0 8px 30px rgba(0,0,0,0.4), 0 0 20px rgba(42,157,143,0.15);
        }

        .modal-images.single .modal-img {
            grid-column: span 2;
            height: 280px;
        }

        /* Loading & error states */
        .img-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(42,157,143,0.05);
            border: 1px dashed rgba(42,157,143,0.2);
            border-radius: 12px;
            height: 200px;
            color: var(--text-dim);
            font-size: 0.75rem;
            letter-spacing: 2px;
            grid-column: span 2;
        }

        .img-loading-spinner {
            display: inline-block;
            width: 20px; height: 20px;
            border: 2px solid rgba(42,157,143,0.2);
            border-top-color: var(--teal);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 0.8rem;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ─── LEGEND ─── */
        .legend {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 50;
            background: rgba(21, 31, 31, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(42,157,143,0.2);
            border-radius: 14px;
            padding: 1rem 1.2rem;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .legend-title {
            font-size: 0.65rem;
            letter-spacing: 2px;
            color: var(--text-dim);
            margin-bottom: 0.2rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            font-size: 0.7rem;
            color: var(--text-dim);
        }

        .legend-dot {
            width: 14px; height: 14px;
            border-radius: 50%;
            border: 2px solid;
            flex-shrink: 0;
        }
        .legend-dot.locked   { background: rgba(17,28,28,0.8); border-color: rgba(42,157,143,0.1); }
        .legend-dot.unlocked { background: var(--card); border-color: var(--teal); }
        .legend-dot.viewed   { background: rgba(42,157,143,0.2); border-color: var(--amber); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: rgba(42,157,143,0.3); border-radius: 4px; }

        @media (max-width: 768px) {
            nav { padding: 1rem 1.5rem; }
            .path-segment { margin: 1.5rem 0; min-height: 120px; }
            .path-segment.left,
            .path-segment.right { justify-content: center; padding: 0; }
            .skill-node { width: 100px; height: 100px; }
            .skill-icon { font-size: 1.6rem; }
            .modal-images { grid-template-columns: 1fr; }
            .modal-images.single .modal-img { grid-column: span 1; }
            .legend { display: none; }
        }
    </style>
</head>

            localStorage.setItem('journeyProgress', JSON.stringify(viewedNodes));
        }

        function isUnlocked(nodeId) {
            if (nodeId === 0) return true;
            return viewedNodes.includes(nodeId - 1);
        }

        function buildTree() {
            const mapPath = document.getElementById('mapPath');
            mapPath.innerHTML = '';

            milestones.forEach((milestone, index) => {
                const position = pathPattern[index % pathPattern.length];
                const segment  = document.createElement('div');
                segment.className = `path-segment ${position}`;

                const nodeDiv  = document.createElement('div');
                nodeDiv.className = 'skill-node';
                nodeDiv.dataset.id = index;

                const unlocked = isUnlocked(index);
                const viewed   = viewedNodes.includes(index);

                if (viewed)         nodeDiv.classList.add('viewed');
                else if (unlocked)  nodeDiv.classList.add('unlocked');
                else                nodeDiv.classList.add('locked');

                nodeDiv.innerHTML = `
                    <div class="skill-circle">
                        <div class="skill-icon">${unlocked ? milestone.icon : '🔒'}</div>
                        <div class="skill-year">${unlocked ? milestone.date : '???'}</div>
                    </div>
                    <div class="skill-label">${unlocked ? milestone.title : 'Locked'}</div>
                `;

                if (unlocked) nodeDiv.onclick = () => openModal(index);

                segment.appendChild(nodeDiv);
                mapPath.appendChild(segment);
            });

            drawConnections();
            updateProgress();
        }

        function drawConnections() {
            const svg = document.getElementById('connections');
            svg.innerHTML = '';

            const container = document.querySelector('.skill-tree-container');
            svg.setAttribute('height', container.scrollHeight);

            connections.forEach(([from, to]) => {
                const fromNode = document.querySelector(`[data-id="${from}"] .skill-circle`);
                const toNode   = document.querySelector(`[data-id="${to}"] .skill-circle`);
                if (!fromNode || !toNode) return;

                const fromRect = fromNode.getBoundingClientRect();
                const toRect   = toNode.getBoundingClientRect();
                const svgRect  = svg.getBoundingClientRect();

                const x1 = fromRect.left + fromRect.width  / 2 - svgRect.left;
                const y1 = fromRect.top  + fromRect.height / 2 - svgRect.top;
                const x2 = toRect.left   + toRect.width   / 2 - svgRect.left;
                const y2 = toRect.top    + toRect.height  / 2 - svgRect.top;
                const midY = (y1 + y2) / 2;

                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', `M ${x1} ${y1} Q ${x1} ${midY}, ${(x1+x2)/2} ${midY} T ${x2} ${y2}`);
                path.setAttribute('class', 'connection-line');

                if (viewedNodes.includes(from) && isUnlocked(to)) {
                    path.classList.add('unlocked');
                }

                svg.appendChild(path);
            });
        }

        async function fetchFolderImages(folderId) {
            if (imageCache[folderId]) return imageCache[folderId];

            const query  = encodeURIComponent(`'${folderId}' in parents and trashed = false`);
            const fields = encodeURIComponent('files(id,name,mimeType)');
            const url    = `https://www.googleapis.com/drive/v3/files?q=${query}&fields=${fields}&key=${GDRIVE_API_KEY}&pageSize=20&orderBy=name`;

            const res  = await fetch(url);
            if (!res.ok) throw new Error('Drive API error');
            const data = await res.json();

            const images = (data.files || []).filter(f => IMAGE_TYPES.includes(f.mimeType));
            imageCache[folderId] = images;
            return images;
        }

        async function openModal(nodeId) {
            const milestone = milestones[nodeId];

            document.getElementById('modalDate').textContent        = milestone.date;
            document.getElementById('modalTitle').textContent       = milestone.title;
            document.getElementById('modalDescription').textContent = milestone.description;

            const imagesDiv = document.getElementById('modalImages');
            imagesDiv.className = 'modal-images';

            // Show loading state
            imagesDiv.innerHTML = `
                <div class="img-loading">
                    <div class="img-loading-spinner"></div>
                    LOADING PHOTOS...
                </div>`;

            document.getElementById('modal').classList.add('active');

            // Mark as viewed early (so unlocking happens)
            if (!viewedNodes.includes(nodeId)) {
                viewedNodes.push(nodeId);
                saveProgress();
                buildTree();
            }

            // Fetch images from Drive
            try {
                const images = await fetchFolderImages(milestone.folderId);

                if (images.length === 0) {
                    imagesDiv.innerHTML = `<div class="img-loading">NO PHOTOS FOUND</div>`;
                    return;
                }

                if (images.length === 1) imagesDiv.classList.add('single');

                imagesDiv.innerHTML = images.map(img => `
                    <img
                        class="modal-img"
                        src="https://lh3.googleusercontent.com/d/${img.id}"
                        alt="${img.name}"
                        onerror="this.src='https://drive.google.com/thumbnail?id=${img.id}&sz=w600'"
                    >
                `).join('');

            } catch (err) {
                imagesDiv.innerHTML = `
                    <div class="img-loading" style="color:#e74c3c;">
                        FAILED TO LOAD PHOTOS
                    </div>`;
            }
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            // Clear images to free memory
            document.getElementById('modalImages').innerHTML = '';
        }

        function updateProgress() {
            document.getElementById('progress').textContent =
                `${viewedNodes.length}/${milestones.length}`;
        }

        loadProgress();
        buildTree();
        window.addEventListener('resize', drawConnections);

        document.getElementById('modal').addEventListener('click', e => {
            if (e.target.id === 'modal') closeModal();
        });

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeModal();
        });
    </script>
</body>
</html>
